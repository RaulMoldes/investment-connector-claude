name: Email weekly digest

# Trigger when the routine (or anyone) pushes a new report file to history/.
# Uses paths filter so unrelated commits (e.g. methodology edits) don't fire the email.
on:
  push:
    branches: [main]
    paths:
      - 'history/20*.md'

# Avoid concurrent runs if two commits land fast
concurrency:
  group: email-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the previous commit to diff against
          fetch-depth: 2

      - name: Find newly added report files
        id: find
        run: |
          set -euo pipefail
          # List files added or modified under history/ matching YYYY-WNN.md pattern
          FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD \
                    | grep -E '^history/20[0-9]{2}-W[0-9]{2}\.md$' || true)

          if [ -z "$FILES" ]; then
            echo "No new weekly report in this push, exiting."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If multiple reports in one push (unusual), pick the most recent
          LATEST=$(echo "$FILES" | sort | tail -n 1)
          echo "Found: $LATEST"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "report_file=$LATEST" >> "$GITHUB_OUTPUT"
          # Derive report ID from filename (strip path and extension)
          REPORT_ID=$(basename "$LATEST" .md)
          echo "report_id=$REPORT_ID" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.find.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract digest from report
        if: steps.find.outputs.found == 'true'
        id: extract
        env:
          REPORT_FILE: ${{ steps.find.outputs.report_file }}
        run: |
          python3 scripts/extract_digest.py "$REPORT_FILE" > /tmp/digest.txt
          # Use multi-line output syntax
          {
            echo "digest<<EOF_DIGEST"
            cat /tmp/digest.txt
            echo "EOF_DIGEST"
          } >> "$GITHUB_OUTPUT"

      - name: Compose email body
        if: steps.find.outputs.found == 'true'
        env:
          REPORT_ID: ${{ steps.find.outputs.report_id }}
          REPORT_FILE: ${{ steps.find.outputs.report_file }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          REPORT_URL="https://github.com/${REPO}/blob/${SHA}/${REPORT_FILE}"
          {
            cat /tmp/digest.txt
            echo ""
            echo "---"
            echo "Full report: ${REPORT_URL}"
            echo ""
            echo "⚠️  Research leads only. Not financial advice."
          } > /tmp/email_body.txt
          echo "Body prepared:"
          cat /tmp/email_body.txt

      - name: Send email via Gmail SMTP
        if: steps.find.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📊 Weekly Research — ${{ steps.find.outputs.report_id }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: Investment Research Agent <${{ secrets.GMAIL_USER }}>
          body: file:///tmp/email_body.txt
